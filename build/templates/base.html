<!DOCTYPE html>
<html lang="{{lang}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <meta name="description" content="{{description}}">
  {{noindex}}
  <link rel="canonical" href="{{canonicalUrl}}">
  <link rel="alternate" hreflang="{{lang}}" href="{{canonicalUrl}}">
  <link rel="alternate" hreflang="{{pairLang}}" href="{{pairCanonicalUrl}}">
  <link rel="alternate" hreflang="x-default" href="{{canonicalUrl}}">
  <link rel="alternate" type="application/rss+xml" title="agent-master RSS" href="{{rssUrl}}">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:type" content="{{ogType}}">
  <meta property="og:url" content="{{canonicalUrl}}">
  <meta property="og:locale" content="{{ogLocale}}">
  <meta property="og:site_name" content="agent-master">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{title}}">
  <meta name="twitter:description" content="{{description}}">
  {{jsonLd}}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&family=Noto+Sans+SC:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{base}}/assets/css/style.css">

  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
{{body}}
  <footer class="site-footer">
    <div class="footer-rule"></div>
    <p>agent-master &mdash; AI Native Knowledge Base &middot; <a href="https://github.com/wilsonwangdev/agent-master/blob/main/CONTRIBUTING.md">Contribute</a></p>
  </footer>
  <script src="{{base}}/assets/js/lang-switch.js"></script>
</body>
</html>
