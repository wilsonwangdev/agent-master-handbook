<!DOCTYPE html>
<html lang="{{lang}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <meta name="description" content="{{description}}">
  {{noindex}}
  <link rel="canonical" href="{{canonicalUrl}}">
  <link rel="alternate" hreflang="{{lang}}" href="{{canonicalUrl}}">
  <link rel="alternate" hreflang="{{pairLang}}" href="{{pairCanonicalUrl}}">
  <link rel="alternate" hreflang="x-default" href="{{canonicalUrl}}">
  <link rel="alternate" type="application/rss+xml" title="{{siteName}} RSS" href="{{rssUrl}}">
  <link rel="alternate" type="text/markdown" href="{{markdownUrl}}">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:type" content="{{ogType}}">
  <meta property="og:url" content="{{canonicalUrl}}">
  <meta property="og:locale" content="{{ogLocale}}">
  <meta property="og:site_name" content="{{siteName}}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{title}}">
  <meta name="twitter:description" content="{{description}}">
  {{jsonLd}}
  <style>html{background:#0a0a0a;color:#d4d4d4}@media(prefers-color-scheme:light){html{background:#fafaf9;color:#292524}}</style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&family=Noto+Sans+SC:wght@400;600&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&family=Noto+Sans+SC:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="{{base}}/assets/css/style.css">

  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
{{body}}
  <footer class="site-footer">
    <div class="footer-rule"></div>
    <p>{{siteName}} &mdash; {{siteTagline}} &middot; <a href="{{contributeUrl}}">Contribute</a></p>
  </footer>
  <script src="{{base}}/assets/js/lang-switch.js"></script>
  <script src="{{base}}/assets/js/copy.js"></script>
  <script src="{{base}}/assets/js/anchors.js"></script>
</body>
</html>
