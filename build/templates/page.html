<article class="page" lang="{{lang}}">
  <nav class="breadcrumbs" aria-label="Breadcrumb">
    <a href="{{homePath}}">Home</a>
    <span class="sep">/</span>
    <a href="{{sectionPath}}">{{sectionTitle}}</a>
    <span class="sep">/</span>
    <span aria-current="page">{{title}}</span>
  </nav>
  <header class="page-header">
    <h1>{{title}}</h1>
    <a class="lang-toggle" href="{{pairPath}}" data-lang="{{pairLang}}">{{pairLang}}</a>
  </header>
  <div class="page-content">
    {{content}}
  </div>
  <footer class="page-footer">
    <a href="{{contributeUrl}}">Contribute</a>
    <time class="last-updated">{{lastUpdatedLabel}}</time>
  </footer>
</article>
