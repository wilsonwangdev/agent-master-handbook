<main class="index" lang="{{lang}}">
  <header class="site-header">
    <div class="header-top">
      <h1>{{siteName}}</h1>
      <div class="header-actions">
        <a class="contribute-link" href="{{contributeUrl}}">Contribute</a>
        <a class="lang-toggle" href="{{base}}/{{pairLang}}/">{{pairLang}}</a>
      </div>
    </div>
    <p class="tagline">{{siteTagline}}</p>
  </header>

  <section class="quickstart">
    <h2>{{quickstartTitle}}</h2>
    <p class="quickstart-desc">{{quickstartDesc}}</p>
    <div class="prompt-block">
      <button class="copy-btn" aria-label="Copy prompt">{{copyLabel}}</button>
      <pre><code>{{quickstartPrompt}}</code></pre>
    </div>
    <p class="quickstart-hint">{{quickstartHint}}</p>
  </section>

  {{timeline}}

  {{listings}}
</main>
